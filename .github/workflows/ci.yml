name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run library tests (lib/)
        run: cargo test -p m4againrs

      - name: Run CLI end-to-end tests (cli/)
        run: cargo test -p m4againrs-cli

      - name: Build Python extension
        env:
          PYO3_PYTHON: python
        run: cargo build -p m4againrs-py

      - name: Run Python binding tests (python/)
        working-directory: python
        run: python -m unittest tests.test_python_bindings
