name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Determine and validate version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import tomllib

          manifest = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          try:
              workspace_version = manifest["workspace"]["package"]["version"]
          except KeyError as exc:
              raise SystemExit(f"Could not determine workspace version from Cargo.toml: missing {exc}")

          release_tag = f"v{workspace_version}"

          result = subprocess.run(
              ["gh", "api", f"repos/{os.environ['GH_REPO']}/git/ref/tags/{release_tag}"],
              capture_output=True,
          )
          if result.returncode == 0:
              raise SystemExit(f"Tag {release_tag} already exists. Bump the version before releasing.")

          print(f"Release tag: {release_tag}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tag={release_tag}\n")
          PY

  build-wheel:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
          - arch: arm64
            runs-on: macos-latest
          - arch: amd64
            runs-on: windows-latest

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install release build dependencies
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        working-directory: python
        env:
          PYO3_PYTHON: python
        run: maturin build --release -o ../dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ runner.os }}-${{ matrix.arch }}-py313
          path: dist/*.whl
          if-no-files-found: error

  build-cli:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target-triple: x86_64-unknown-linux-gnu
          - runs-on: ubuntu-24.04-arm
            target-triple: aarch64-unknown-linux-gnu
          - runs-on: macos-latest
            target-triple: aarch64-apple-darwin
          - runs-on: windows-latest
            target-triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI binary
        run: cargo build --release -p m4againrs-cli

      - name: Package CLI binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          TARGET_TRIPLE: ${{ matrix.target-triple }}
        run: |
          mkdir -p dist
          version="${RELEASE_TAG#v}"
          stem="m4againrs-${version}-${TARGET_TRIPLE}"
          staging="dist/${stem}"
          mkdir -p "$staging"
          cp target/release/m4againrs "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          tar -czf "dist/${stem}.tar.gz" -C dist "$stem"
          rm -rf "$staging"

      - name: Package CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          TARGET_TRIPLE: ${{ matrix.target-triple }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = $env:RELEASE_TAG -replace '^v',''
          $stem = "m4againrs-$version-$env:TARGET_TRIPLE"
          $staging = "dist/$stem"
          New-Item -ItemType Directory -Force $staging | Out-Null
          Copy-Item "target/release/m4againrs.exe" $staging
          if (Test-Path README.md) { Copy-Item README.md $staging }
          Compress-Archive -Path $staging -DestinationPath "dist/$stem.zip"
          Remove-Item -Recurse -Force $staging

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target-triple }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  create-release:
    needs: [prepare, build-wheel, build-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: release-assets/wheels

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: release-assets/cli

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          mapfile -d '' wheels < <(find release-assets/wheels -type f -name '*.whl' -print0 | sort -z)
          mapfile -d '' bins < <(find release-assets/cli -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | sort -z)
          assets=("${wheels[@]}" "${bins[@]}")
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found under release-assets/" >&2
            exit 1
          fi
          if [ "${#wheels[@]}" -eq 0 ]; then
            echo "No wheel assets found" >&2
            exit 1
          fi
          if [ "${#bins[@]}" -eq 0 ]; then
            echo "No CLI binary assets found" >&2
            exit 1
          fi

          prerelease_flag=""
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            $prerelease_flag \
            "${assets[@]}"

  deploy-pages:
    if: github.ref_name == 'main'
    needs: create-release
    uses: ./.github/workflows/deploy-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
